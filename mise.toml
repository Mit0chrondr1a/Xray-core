[env]
# Prepend rustup shims to PATH so they shadow Homebrew's standalone rust
_.path = ["~/.cargo/bin"]
XRAY_CGO = "1"
GOOS = "linux"
GOARCH = "amd64"

[tools]
# Nix backend (jbadeau/mise-nix plugin)
"nix:go" = "1.26"
"nix:zig" = "0.15"
"nix:llvm_20" = "latest"
"nix:bpf-linker" = "latest"

# Rust via rustup backend — installs musl cross-compilation targets + rust-src
rust = { version = "stable", targets = "x86_64-unknown-linux-musl,aarch64-unknown-linux-musl", components = "rust-src" }

[settings]
experimental = true
